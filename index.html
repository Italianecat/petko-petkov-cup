<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Петко Петков Cup - U12 Турнир</title>
    <style>
        :root {
            --forest-green: #14532d;
            --darker-green: #0a2f1a;
            --antique-gold: #c6a35f;
            --vintage-cream: #fef3c7;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--forest-green);
            color: var(--white);
            line-height: 1.6;
        }

        /* HEADER СТИЛОВЕ */
        header {
            background-color: var(--darker-green);
            border-bottom: 3px solid var(--antique-gold);
            padding: 10px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main-logo-area {
            flex: 1;
        }

        .main-logo {
            height: 90px;
            width: auto;
            transition: transform 0.3s;
        }

        .main-logo:hover {
            transform: scale(1.05);
        }

        nav {
            flex: 2;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: var(--white);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        nav a:hover {
            color: var(--antique-gold);
        }

        .partners-area {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            align-items: center;
        }

        .partner-logo {
            height: 50px;
            width: auto;
            object-fit: contain;
        }

        /* HERO СЕКЦИЯ */
        .hero {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(20, 83, 45, 0.7), rgba(10, 47, 26, 0.9)), 
                        url('https://condorsport.bg/wp-content/uploads/2023/10/stadium-bg.jpg'); /* Временен фон */
            background-size: cover;
            background-position: center;
            padding: 20px;
        }

        .hero h1 {
            color: var(--antique-gold);
            font-size: clamp(2rem, 8vw, 4rem);
            margin: 0;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 1.4rem;
            max-width: 800px;
            color: var(--vintage-cream);
        }

        .btn-reg {
            background-color: var(--antique-gold);
            color: var(--darker-green);
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .btn-reg:hover {
            background-color: var(--vintage-cream);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* МОБИЛНА ВЕРСИЯ */
        @media (max-width: 900px) {
            header {
                flex-direction: column;
                padding: 20px;
            }
            nav ul {
                margin: 20px 0;
                flex-wrap: wrap;
                justify-content: center;
            }
            .partners-area {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="main-logo-area">
            <img src="logo-petkov.png" alt="Петко Петков Cup" class="main-logo">
        </div>
        
        <nav>
            <ul>
                <li><a href="#teams">Отбори</a></li>
                <li><a href="#program">Програма</a></li>
                <li><a href="#history">История</a></li>
                <li><a href="#contact">Контакти</a></li>
            </ul>
        </nav>

        <div class="partners-area">
            <img src="logo_condor-2025-_white.png" alt="Condor Sport" class="partner-logo">
            <img src="beroe-stara-zagora.png" alt="Берое" class="partner-logo">
            <img src="gerb-obshtina.png" alt="Община Стара Загора" class="partner-logo">
        </div>
    </header>

    <section class="hero">
        <h1>Петко Петков Cup</h1>
        <p>Международен детски футболен турнир U12 <br> гр. Стара Загора</p>
        <a href="https://condorsport.bg/info/international-tournament-petko-petkov-stara-zagora" class="btn-reg">Регистрация и Инфо</a>
    </section>

</body>
</html>
