<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Петко Петков Cup - U12 Турнир</title>
    <style>
        :root {
            --forest-green: #14532d;
            --darker-green: #0a2f1a;
            --antique-gold: #c6a35f;
            --vintage-cream: #fef3c7;
            --white: #ffffff;
            --light-gray: #f4f4f4;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--white);
            color: #333;
            line-height: 1.6;
        }

        /* HEADER */
        header {
            background-color: var(--darker-green);
            border-bottom: 3px solid var(--antique-gold);
            padding: 10px 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .main-logo-area { flex: 1; }
        .main-logo { height: 80px; width: auto; transition: transform 0.3s; }
        .main-logo:hover { transform: scale(1.05); }

        nav { flex: 2; }
        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 0;
            padding: 0;
        }
        nav a {
            text-decoration: none;
            color: var(--white);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        nav a:hover { color: var(--antique-gold); }

        .partners-area {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            align-items: center;
        }
        .partner-logo { height: 40px; width: auto; object-fit: contain; }

        /* HERO SECTION */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(20, 83, 45, 0.75), rgba(10, 47, 26, 0.9)), 
                        url('https://condorsport.bg/wp-content/uploads/2023/10/stadium-bg.jpg');
            background-size: cover;
            background-position: center;
            color: var(--white);
            padding: 20px;
        }

        .hero h1 {
            color: var(--antique-gold);
            font-size: clamp(2rem, 6vw, 3.5rem);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hero p { font-size: 1.2rem; color: var(--vintage-cream); margin: 10px 0 25px; }

        .btn-reg {
            background-color: var(--antique-gold);
            color: var(--darker-green);
            padding: 12px 35px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        .btn-reg:hover { background-color: var(--white); transform: translateY(-2px); }

        /* СЕКЦИЯ ОТБОРИ */
        .teams-section {
            padding: 50px 5%;
            background-color: var(--light-gray);
            text-align: center;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 35px;
            color: var(--forest-green);
            text-transform: uppercase;
            border-bottom: 3px solid var(--antique-gold);
            display: inline-block;
            padding-bottom: 5px;
        }

        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .team-card {
            background: white;
            padding: 15px 10px;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            border: 1px solid #eee;
        }
        .team-card:hover {
            transform: translateY(-5px);
            border-color: var(--antique-gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .team-logo-bg {
            width: 65px;
            height: 65px;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .team-logo-bg img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .team-card h3 {
            margin: 5px 0;
            font-size: 0.9rem;
            color: var(--darker-green);
            font-weight: bold;
        }
        .team-card p { margin: 0; color: #888; font-size: 0.7rem; text-transform: uppercase; }

        /* МОБИЛНА ВЕРСИЯ */
        @media (max-width: 800px) {
            header { flex-direction: column; padding: 15px; }
            nav ul { margin: 15px 0; flex-wrap: wrap; justify-content: center; gap: 10px; }
            .partners-area { justify-content: center; margin-top: 10px; }
            .main-logo { height: 60px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="main-logo-area">
            <img src="logo-petkov.png" alt="Петко Петков Cup" class="main-logo">
        </div>
        
        <nav>
            <ul>
                <li><a href="#teams">Участници</a></li>
                <li><a href="#program">Програма</a></li>
                <li><a href="#history">История</a></li>
                <li><a href="#contact">Контакти</a></li>
            </ul>
        </nav>

        <div class="partners-area">
            <img src="logo_condor-2025-_white.png" alt="Condor Sport" class="partner-logo">
            <img src="beroe-stara-zagora.png" alt="Берое" class="partner-logo">
            <img src="gerb-obshtina.png" alt="Община Стара Загора" class="partner-logo">
        </div>
    </header>

    <section class="hero">
        <h1>Петко Петков Cup</h1>
        <p>Международен детски футболен турнир U12 <br> гр. Стара Загора</p>
        <a href="#teams" class="btn-reg">Виж Участниците</a>
    </section>

    <section id="teams" class="teams-section">
        <div class="container">
            <h2 class="section-title">Участници U12</h2>
            <div id="teams-container" class="teams-grid">
                </div>
        </div>
    </section>

    <script>
        // СПИСЪК С ОТБОРИ - Добавяй новите тук!
        const teamsData = [
            { name: "ПФК Берое", city: "Стара Загора", logo: "beroe-stara-zagora.png" },
            { name: "ФК Кондор", city: "Стара Загора", logo: "logo_condor-2025-_white.png" },
            { name: "Локомотив Пд", city: "Пловдив", logo: "logo-petkov.png" },
            { name: "Левски София", city: "София", logo: "logo-petkov.png" },
            { name: "ЦСКА-София", city: "София", logo: "logo-petkov.png" },
            { name: "Ботев Пд", city: "Пловдив", logo: "logo-petkov.png" },
            { name: "Черно Море", city: "Варна", logo: "logo-petkov.png" },
            { name: "Лудогорец", city: "Разград", logo: "logo-petkov.png" },
            { name: "Етър", city: "В. Търново", logo: "logo-petkov.png" },
            { name: "Славия", city: "София", logo: "logo-petkov.png" }
            // Копирай ред и добави име на новите отбори
        ];

        function renderTeams() {
            const container = document.getElementById('teams-container');
            container.innerHTML = teamsData.map(team => `
                <div class="team-card">
                    <div class="team-logo-bg">
                        <img src="${team.logo}" alt="${team.name}">
                    </div>
                    <h3>${team.name}</h3>
                    <p>${team.city}</p>
                </div>
            `).join('');
        }

        window.onload = renderTeams;
    </script>

</body>
</html>
